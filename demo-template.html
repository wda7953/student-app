<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: #f2f2f7; color: #1c1c1e; }
    .header { background: #4A90D9; color: white; padding: 16px 20px; font-size: 20px; font-weight: 600; }
    .note { background: #fffbe6; padding: 12px 16px; font-size: 14px; color: #555; }
    .sec { padding: 14px 16px 6px; font-size: 13px; color: #8e8e93; }
    .card { background: white; border-radius: 12px; margin: 0 16px 12px; overflow: hidden; }
    .card select, .card input { width: 100%; padding: 14px 16px; border: none; font-size: 16px; background: transparent; outline: none; appearance: auto; }
    #level-wrap { display: none; }
    .card textarea { width: 100%; padding: 14px 16px; border: none; font-size: 14px; font-family: monospace; line-height: 1.8; background: transparent; outline: none; resize: none; min-height: 420px; color: #1c1c1e; }
    .hint { padding: 4px 16px 12px; font-size: 12px; color: #aaa; }
    .btn { width: calc(100% - 32px); margin: 0 16px 32px; padding: 16px; background: #4A90D9; color: white; border: none; border-radius: 12px; font-size: 17px; font-weight: 600; }
  </style>
</head>
<body>
  <div class="header">新增上課記錄 Demo</div>
  <div class="note">選課程類型後，內容欄自動填入對應範本，直接修改數值即可。</div>

  <div class="sec">日期</div>
  <div class="card"><input type="date" id="date"></div>

  <div class="sec">課程類型</div>
  <div class="card"><select id="type" onchange="onTypeChange()">
    <option value="strength">重訓</option>
    <option value="pilates">Pilates</option>
  </select></div>

  <div id="level-wrap">
    <div class="sec">等級</div>
    <div class="card"><select id="level" onchange="fillTemplate()">
      <option value="basic">初級</option>
      <option value="inter">中級</option>
    </select></div>
  </div>

  <div class="sec">課程內容</div>
  <div class="card">
    <textarea id="content"></textarea>
    <div class="hint">不需要的行直接刪掉；數值填在冒號後面</div>
  </div>

  <button class="btn">儲存</button>

function onTypeChange() {
  var t = document.getElementById('type').value;
  document.getElementById('level-wrap').style.display = t === 'pilates' ? 'block' : 'none';
  fillTemplate();
}

function fillTemplate() {
  var t = document.getElementById('type').value;
  var key = t === 'pilates' ? document.getElementById('level').value : 'strength';
  var ta = document.getElementById('content');
  ta.value = TMPL[key];
  ta.style.height = 'auto';
  ta.style.height = (ta.scrollHeight + 20) + 'px';
}

document.getElementById('date').value = new Date().toISOString().split('T')[0];
fillTemplate();

</body>
</html>
