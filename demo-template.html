<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智慧文字模板 Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: #f2f2f7; color: #1c1c1e; }
    .header { background: #4A90D9; color: white; padding: 16px 20px; font-size: 20px; font-weight: 600; }
    .note { background: #fff9c4; padding: 12px 16px; font-size: 14px; color: #555; border-bottom: 1px solid #e5e5ea; }
    .section { padding: 14px 16px 6px; font-size: 13px; color: #8e8e93; letter-spacing: 0.3px; }
    .form-group { background: white; border-radius: 12px; margin: 0 16px 12px; overflow: hidden; }
    .form-group input { width: 100%; padding: 14px 16px; border: none; font-size: 16px; background: transparent; outline: none; }
    .seg { display: flex; margin: 0 16px 12px; border-radius: 12px; overflow: hidden; border: 1px solid #4A90D9; }
    .seg button { flex: 1; padding: 12px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; background: white; color: #4A90D9; }
    .seg button.on { background: #4A90D9; color: white; }
    .level-row { display: none; margin: 0 16px 12px; }
    .level-row.show { display: flex; border-radius: 12px; overflow: hidden; border: 1px solid #e5e5ea; }
    .level-row button { flex: 1; padding: 10px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; background: white; color: #8e8e93; }
    .level-row button.on { background: #e8f0fb; color: #4A90D9; }
    .content-box { background: white; border-radius: 12px; margin: 0 16px 12px; }
    .content-box textarea { width: 100%; padding: 14px 16px; border: none; font-size: 14px; font-family: monospace; line-height: 1.8; background: transparent; outline: none; resize: none; min-height: 400px; color: #1c1c1e; }
    .hint { padding: 6px 16px 12px; font-size: 12px; color: #aaa; }
    .btn { width: calc(100% - 32px); margin: 0 16px 32px; padding: 16px; background: #4A90D9; color: white; border: none; border-radius: 12px; font-size: 17px; font-weight: 600; cursor: pointer; }
  </style>
</head>
<body>
  <div class="header">新增上課記錄（Demo）</div>
  <div class="note">選課程類型後，內容欄自動填入對應範本，直接修改數值即可。</div>

  <div class="section">日期</div>
  <div class="form-group">
    <input type="date" id="date">
  </div>

  <div class="section">課程類型</div>
  <div class="seg" id="type-seg">
    <button class="on" onclick="setType('重訓')">重訓</button>
    <button onclick="setType('Pilates')">Pilates</button>
  </div>

  <div class="level-row" id="level-row">
    <button class="on" onclick="setLevel('初級')">初級</button>
    <button onclick="setLevel('中級')">中級</button>
  </div>

  <div class="section">課程內容</div>
  <div class="content-box">
    <textarea id="content"></textarea>
    <div class="hint">不需要的行直接刪掉；數值填在冒號後面</div>
  </div>

  <button class="btn">儲存</button>

  <script>
    var type = '重訓', level = '初級';

    var T = {
      重訓: "【soft tissue】\n\n【mobility】\n\n【warm up】\n\n【Activate】\n\n【爆發】\n動作：\t\t\tF：\tS：\t次：\n\n【下肢推】\n動作：\t\t\tF：\tS：\t次：\n\n【下肢拉】\n動作：\t\t\tF：\tS：\t次：\n\n【上肢推】\n動作：\t\t\tF：\tS：\t次：\n\n【上肢拉】\n動作：\t\t\tF：\tS：\t次：\n\n【核心】\n動作：\t\t\tF：\tS：\t次：\n\n【體能】\n",
      Pilates_初級: "【初級】\nF\tS\t次\t動作\n" +
        "F1\t3-4\t10-12\tFootwork 腿部練習\n" +
        "F1\t3-4\t10-12\tSecond Position 第二種姿勢\n" +
        "F1\t2-3\t5-10\tSingle Leg 單腿練習\n" +
        "F1\t2-3\t10*10\tHundred\n" +
        "F1\t2\t10\tBent & Stretch 屈伸練習\n" +
        "F1\t2\t5\tLift & Lower 抬腿與放腿\n" +
        "F1\t2\t2*5\tAdductor Stretch 伸展內收肌\n" +
        "F1\t2\t5\tShort Spine 脊椎捲曲\n" +
        "F1\t1-2\t5\tMisback Series 中背部系列\n" +
        "F1\t1-2\t5-10\tBack Rowing Preps 後划準備\n" +
        "F1\t0.5-1\t5-10\tSide Arm Preps Sitting 側坐手臂準備\n" +
        "F1\t0.5-1\t5\tSide Twist Sitting 側轉坐姿\n" +
        "F1\t1-2\t5\tFront Rowing Preps 前划準備\n" +
        "F1/2\t2-3\t10\tStomach Massage 腹部按摩\n" +
        "F4\t0.5-1\t5\tArm Pulling Straps Long Box\n" +

        "\n備註：",
      Pilates_中級: "【中級】\nF\tS\t次\t動作\n" +
        "F1\t3-4\t10-12\tFootwork 腿部練習\n" +
        "F1\t3-4\t10-12\tSecond Position 第二種姿勢\n" +
        "F1\t2-3\t5-10\tSingle Leg 單腿練習\n" +
        "F1/4\t2-3\t10*10\tHundred\n" +
        "F1/4\t2\t10\tBent & Stretch 屈伸練習\n" +
        "F1\t2\t5\tShort Spine 脊椎捲曲\n" +

        "F1\t1-2\t5\tBack Rowing 後划\n" +
        "F1/4\t1-2\t5\tFront Rowing 前划\n" +
        "F1/2\t2-3\t10\tStomach Massage 腹部按摩\n" +
        "F4\t1\t5\tArm Pulling Straps Long Box\n" +
        "F4\t2\t10\tBackstroke Prep Long Box 仰泳練習準備\n" +

        "F4\t2\t3\tTwist With Round Back Short Box 扭轉\n" +
        "F4\t2\t3\tLean Short Box\n" +

        "F1\t1-2\t5\tLong Stretch\n" +
        "F1\t1-2\t3*2set\tDown Stretch\n" +

        "F3/4\t1-2\t4\tReverse Expansion\n" +
        "F1\t1\t3-5\tMermaid 美人魚姿\n" +
        "F1\t2\t10\tLeg Circles 雙腳畫弧\n" +
        "F4\t2-3\t3\tLong Spine 脊椎\n" +
        "F1\t2\t10\tKnee Stretches 膝部伸展\n" +
        "F1\t2-3\t20-60\tRunning 跑步姿\n" +
        "F1\t2-3\t10\tHip Lift 髖部上抬\n" +
        "F1\t2-3\t5-10\tHip Rolls 髖部起伏\n" +
        "F1/2\t2\t5\tSingle Thigh Stretch 單側大腿伸展\n" +
        "F1\t1-2\t5\tFront Splits 前劈叉\n" +
        "F1\t1-2\t5\tBack Splits 後劈叉\n" +
        "F4\t1-2\t8-10\tSide Splits 側劈叉\n" +
        "F1\t1-2\t5\tStar Prep\n" +
        "\n備註："
    };

    function setType(t) {
      type = t;
      document.querySelectorAll('#type-seg button').forEach(function(b) {
        b.className = b.textContent === t ? 'on' : '';
      });
      var lr = document.getElementById('level-row');
      if (t === 'Pilates') { lr.className = 'level-row show'; } else { lr.className = 'level-row'; }
      updateContent();
    }

    function setLevel(l) {
      level = l;
      document.querySelectorAll('#level-row button').forEach(function(b) {
        b.className = b.textContent === l ? 'on' : '';
      });
      updateContent();
    }

    function updateContent() {
      var key = type === 'Pilates' ? 'Pilates_' + level : '重訓';
      var ta = document.getElementById('content');
      ta.value = T[key];
      ta.style.height = 'auto';
      ta.style.height = (ta.scrollHeight + 20) + 'px';
    }

    document.getElementById('date').value = new Date().toISOString().split('T')[0];
    updateContent();
  </script>
</body>
</html>
