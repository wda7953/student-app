<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head>
<body>
<h2 id="status">JS 未執行</h2>
<select id="t" onchange="go()">
  <option value="a">選項 A</option>
  <option value="b">選項 B</option>
</select>
<textarea id="out" style="width:100%;height:200px"></textarea>
<script>
document.getElementById('status').textContent = 'JS 正常執行';
var M = { a: 'AAA content', b: 'BBB content' };
function go() {
  document.getElementById('out').value = M[document.getElementById('t').value];
}
go();
</script>
</body>
</html>
