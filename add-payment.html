<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>新增收款記錄</title>
  <link rel="stylesheet" href="css/style.css">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#4A90D9">
  <style>
    .link-class-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      border-bottom: 1px solid #f2f2f7;
    }
    .link-class-row:last-child { border-bottom: none; }
    .link-class-row input[type=checkbox] { width: 20px; height: 20px; flex-shrink: 0; accent-color: #4A90D9; }
    .link-class-info { flex: 1; }
    .link-class-date { font-size: 13px; color: #8e8e93; }
    .link-class-content { font-size: 14px; font-weight: 600; margin-top: 2px; color: #1c1c1e; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .link-hint { font-size: 13px; color: #8e8e93; padding: 10px 16px; text-align: center; }
  </style>
</head>
<body>
  <div class="header">
    <button class="back-btn" onclick="history.back()">‹ 返回</button>
    <span>新增收款記錄</span>
    <span></span>
  </div>
  <form onsubmit="submitForm(event)" style="padding-top:16px">
    <div class="form-group">
      <label>場地</label>
      <select id="venue" onchange="loadUnlinked()">
        <option value="武士">武士</option>
        <option value="柔力">柔力</option>
      </select>
    </div>
    <div class="form-group">
      <label>方案名稱</label>
      <input id="package_name" type="text" placeholder="活動A / 一般課 / 體驗課…">
    </div>
    <div class="form-group">
      <label>收款日期</label>
      <input id="date" type="date" required>
    </div>
    <div class="form-group">
      <label>購買堂數</label>
      <input id="sessions" type="number" placeholder="6" min="1" required>
    </div>
    <div class="form-group">
      <label>總費用</label>
      <input id="total" type="number" placeholder="8000" min="0">
    </div>
    <div class="form-group">
      <label>已付金額</label>
      <input id="paid" type="number" placeholder="8000" min="0">
    </div>
    <div class="form-group">
      <label>備註</label>
      <input id="notes" type="text" placeholder="補充說明">
    </div>

    <!-- 未連結課程選擇 -->
    <div id="link-section" style="display:none">
      <div class="section">連結舊課程（選填）</div>
      <div id="unlinked-list" class="card"></div>
      <div class="notice" style="margin-top:0">未勾選的課程不連結，此收款從下次新課開始計算。</div>
    </div>

    <button type="submit" class="btn-primary" style="margin-top:16px">儲存</button>
    <div style="height:30px"></div>
  </form>

  <script src="js/api.js"></script>
  <script>
    const studentId = new URLSearchParams(location.search).get('id');

    function localDate(val) {
      const d = new Date(val);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    const now = new Date();
    document.getElementById('date').value = localDate(now);

    let unlinkedClasses = [];

    async function loadUnlinked() {
      const venue = document.getElementById('venue').value;
      const section = document.getElementById('link-section');
      const list = document.getElementById('unlinked-list');
      list.innerHTML = '<div class="link-hint">載入中…</div>';
      section.style.display = 'block';

      const classes = await API.apiGet('getClasses', { studentId });
      unlinkedClasses = classes
        .filter(c => c.venue === venue && !c.payment_id)
        .sort((a, b) => String(a.date).localeCompare(String(b.date)));

      if (unlinkedClasses.length === 0) {
        list.innerHTML = '<div class="link-hint">無未連結課程</div>';
        return;
      }

      list.innerHTML = unlinkedClasses.map((c, i) => {
        const preview = (c.content || '').replace(/\s*\/\s*/g, '、').slice(0, 30);
        return `<div class="link-class-row">
          <input type="checkbox" id="cls-${i}" value="${c.id}">
          <label class="link-class-info" for="cls-${i}">
            <div class="link-class-date">${localDate(c.date)} · ${c.type || ''}</div>
            <div class="link-class-content">${preview || '-'}</div>
          </label>
        </div>`;
      }).join('');
    }

    async function submitForm(e) {
      e.preventDefault();
      const btn = document.querySelector('.btn-primary');
      btn.textContent = '儲存中…';
      btn.disabled = true;

      const venue = document.getElementById('venue').value;
      const sessions = Number(document.getElementById('sessions').value);

      // 1. 建立收款記錄
      const result = await API.apiPost('addPayment', {
        student_id: studentId,
        venue,
        package_name: document.getElementById('package_name').value,
        date: document.getElementById('date').value,
        period_sessions: sessions,
        total_amount: Number(document.getElementById('total').value) || 0,
        paid_amount: Number(document.getElementById('paid').value) || 0,
        notes: document.getElementById('notes').value
      });

      // 2. 連結勾選的課程
      const paymentId = result?.id;
      if (paymentId) {
        const checked = [...document.querySelectorAll('#unlinked-list input[type=checkbox]:checked')]
          .map(el => el.value);
        if (checked.length > 0) {
          btn.textContent = '連結課程中…';
          await Promise.all(checked.map(id =>
            API.apiPost('updateClass', { id, payment_id: paymentId })
          ));
        }
      }

      history.back();
    }

    // 頁面載入時先抓一次
    loadUnlinked();
  </script>
</body>
</html>
