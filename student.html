<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>學員資料</title>
  <link rel="stylesheet" href="css/style.css?v=22">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#7A5C3E">
</head>
<body>
  <div class="header">
    <button class="back-btn" onclick="history.back()">‹ 返回</button>
    <span id="student-name">學員資料</span>
    <span></span>
  </div>
  <div class="section">基本資料</div>
  <div class="card" id="info-card"><div class="empty">載入中…</div></div>
  <div class="section">
    上課記錄
    <span style="float:right;display:flex;gap:8px;align-items:center">
      <button id="toggle-view-btn" onclick="toggleDualView()" style="display:none;background:none;border:1px solid #4A90D9;color:#4A90D9;font-size:12px;padding:2px 8px;border-radius:8px;cursor:pointer;font-weight:600">單欄</button>
      <button onclick="goAddClass()" style="background:none;border:none;color:#4A90D9;font-size:14px;cursor:pointer;font-weight:600">＋ 新增</button>
    </span>
  </div>
  <!-- 單欄（預設隱藏，切換後顯示）-->
  <div class="card hidden" id="classes-card"><div class="empty">載入中…</div></div>
  <!-- 雙欄（預設顯示）-->
  <div class="card dual-view-container hidden" id="dual-classes"></div>
  <div class="section">
    收款紀錄
    <button onclick="goAddPayment()" style="float:right;background:none;border:none;color:#4A90D9;font-size:14px;cursor:pointer;font-weight:600">＋ 新增</button>
  </div>
  <div class="card" id="payments-card"><div class="empty">載入中…</div></div>
  <div class="card dual-view-container hidden" id="dual-payments"></div>

  <!-- 連結付款 modal -->
  <div id="link-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <div style="font-size:17px;font-weight:700;margin-bottom:16px">連結到付款周期</div>
      <div class="form-group" style="margin-bottom:12px">
        <label>學員</label>
        <select id="link-student-sel" onchange="loadLinkPayments()" style="width:100%;padding:8px 16px;border:none;font-size:16px;background:transparent;outline:none"></select>
      </div>
      <div id="link-payments-list" style="max-height:240px;overflow-y:auto;border-radius:12px;margin-bottom:16px"></div>
      <div style="display:flex;gap:12px">
        <button onclick="closeLinkModal()" style="flex:1;padding:14px;background:#f2f2f7;border:none;border-radius:12px;font-size:16px;cursor:pointer">取消</button>
        <button onclick="confirmLink()" style="flex:1;padding:14px;background:#4A90D9;color:white;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer">連結</button>
      </div>
    </div>
  </div>

  <script src="js/api.js?v=22"></script>
  <script src="js/student-detail.js?v=22"></script>
</body>
</html>
