<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>新增學員</title>
  <link rel="stylesheet" href="css/style.css">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#7A5C3E">
</head>
<body>
  <div class="header">
    <button class="back-btn" onclick="history.back()">‹ 返回</button>
    <span>新增學員</span>
    <span></span>
  </div>
  <form id="form" onsubmit="submitForm(event)" style="padding-top:16px">
    <div class="form-group">
      <label>姓名</label>
      <input id="name" type="text" required placeholder="輸入姓名">
    </div>
    <div class="form-group">
      <label>電話</label>
      <input id="phone" type="tel" placeholder="0912-345-678">
    </div>
    <div class="form-group">
      <label>上課地點</label>
      <select id="venue">
        <option value="武士">武士</option>
        <option value="柔力">柔力</option>
        <option value="武士,柔力">兩者</option>
      </select>
    </div>
    <div class="form-group">
      <label>備註</label>
      <textarea id="notes" placeholder="補充資訊"></textarea>
    </div>
    <button type="submit" class="btn-primary">儲存</button>
  </form>

  <script src="js/api.js"></script>
  <script>
    async function submitForm(e) {
      e.preventDefault();
      const btn = document.querySelector('.btn-primary');
      btn.textContent = '儲存中…';
      btn.disabled = true;
      await API.apiPost('addStudent', {
        name: document.getElementById('name').value,
        phone: document.getElementById('phone').value,
        venue: document.getElementById('venue').value,
        notes: document.getElementById('notes').value
      });
      location.href = 'index.html';
    }
  </script>
</body>
</html>
