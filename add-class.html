<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>新增上課記錄</title>
  <link rel="stylesheet" href="css/style.css">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#7A5C3E">
  <style>
    /* 智慧模板專用樣式 */
    .template-card {
      background: white;
      border-radius: 12px;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .template-header {
      padding: 12px 16px 8px;
      font-size: 13px;
      color: #8e8e93;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #f2f2f7;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .template-clear {
      font-size: 13px;
      color: #ff3b30;
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 8px;
    }
    /* Level tabs */
    .level-tabs {
      display: flex;
      padding: 10px 12px 6px;
      gap: 8px;
    }
    .level-tab {
      flex: 1;
      padding: 8px;
      border-radius: 8px;
      border: 1.5px solid #e5e5ea;
      background: white;
      font-size: 15px;
      font-weight: 600;
      color: #8e8e93;
      cursor: pointer;
    }
    .level-tab.active {
      background: #4A90D9;
      border-color: #4A90D9;
      color: white;
    }
    /* Category tabs */
    .cat-tabs {
      display: flex;
      flex-wrap: wrap;
      padding: 10px 12px 6px;
      gap: 6px;
    }
    .cat-tab {
      padding: 6px 14px;
      border-radius: 16px;
      border: 1.5px solid #e5e5ea;
      background: white;
      font-size: 14px;
      font-weight: 600;
      color: #8e8e93;
      cursor: pointer;
    }
    .cat-tab.active {
      background: #4A90D9;
      border-color: #4A90D9;
      color: white;
    }
    /* Exercise chips grid */
    .exercise-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      padding: 8px 12px 12px;
    }
    .ex-chip {
      padding: 10px 8px;
      border-radius: 8px;
      border: 1.5px solid #e5e5ea;
      background: white;
      font-size: 13px;
      color: #1c1c1e;
      cursor: pointer;
      text-align: left;
      line-height: 1.3;
      min-height: 44px;
      display: flex;
      align-items: center;
    }
    .ex-chip.selected {
      background: #e8f1fc;
      border-color: #4A90D9;
      color: #1a60b0;
      font-weight: 600;
    }
    /* 重訓已選動作 */
    .selected-list {
      padding: 0 12px 12px;
    }
    .selected-ex-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid #f2f2f7;
    }
    .selected-ex-row:last-child {
      border-bottom: none;
    }
    .selected-ex-name {
      flex: 1;
      font-size: 14px;
      font-weight: 600;
      color: #1c1c1e;
    }
    .selected-ex-setting {
      width: 120px;
      border: 1px solid #e5e5ea;
      border-radius: 6px;
      padding: 5px 8px;
      font-size: 13px;
      color: #1c1c1e;
      background: #f9f9fb;
    }
    .selected-ex-del {
      background: none;
      border: none;
      color: #ff3b30;
      font-size: 18px;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
    }
    .selected-count {
      font-size: 13px;
      color: #4A90D9;
      font-weight: 600;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="header">
    <button class="back-btn" onclick="history.back()">‹ 返回</button>
    <span>新增上課記錄</span>
    <span></span>
  </div>
  <form onsubmit="submitForm(event)" style="padding-top:16px">
    <!-- 日期 -->
    <div class="form-group">
      <label>日期</label>
      <input id="date" type="date" required>
    </div>

    <!-- 地點 ｜ 類型 ｜ 一對二夥伴 -->
    <div style="display:flex;gap:0;border-bottom:1px solid #f2f2f7">
      <div style="flex:1;padding:12px 16px;border-right:1px solid #f2f2f7">
        <div style="font-size:13px;color:#8e8e93;margin-bottom:4px">地點</div>
        <select id="venue" onchange="checkActivePayment()" style="border:none;font-size:15px;font-weight:500;background:transparent;outline:none;width:100%;color:#1c1c1e">
          <option value="武士">武士</option>
          <option value="柔力">柔力</option>
        </select>
      </div>
      <div style="flex:1;padding:12px 16px;border-right:1px solid #f2f2f7">
        <div style="font-size:13px;color:#8e8e93;margin-bottom:4px">類型</div>
        <select id="type" onchange="onTypeChange()" style="border:none;font-size:15px;font-weight:500;background:transparent;outline:none;width:100%;color:#1c1c1e">
          <option value="重訓">重訓</option>
          <option value="Pilates">Pilates</option>
          <option value="重訓+Pilates">重訓＋Pilates</option>
        </select>
      </div>
      <div style="flex:1;padding:12px 16px">
        <div style="font-size:13px;color:#8e8e93;margin-bottom:4px">夥伴 <span style="font-size:11px">（選填）</span></div>
        <select id="partner" style="border:none;font-size:15px;font-weight:500;background:transparent;outline:none;width:100%;color:#1c1c1e">
          <option value="">無</option>
        </select>
      </div>
    </div>

    <!-- 付款狀態／單次收費勾選 -->
    <div id="session-notice"></div>

    <!-- 額外收費 -->
    <div class="form-group">
      <label>額外收費（現金）</label>
      <input id="extra_charge" type="number" placeholder="0（臨時加人 +500）" min="0">
    </div>

    <!-- ===== 智慧模板：Pilates ===== -->
    <div id="pilates-template" class="template-card hidden">
      <div class="template-header">
        <span>Pilates 動作</span>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="selected-count" id="pilates-count"></span>
          <button type="button" class="template-clear" onclick="clearPilates()">清除</button>
        </div>
      </div>
      <div class="level-tabs">
        <button type="button" class="level-tab active" id="tab-beginner" onclick="switchLevel('beginner')">初級</button>
        <button type="button" class="level-tab" id="tab-advanced" onclick="switchLevel('advanced')">中級</button>
      </div>
      <div class="exercise-grid" id="pilates-grid"></div>
      <div style="display:flex;gap:8px;padding:4px 12px 12px">
        <input id="custom-pilates" type="text" placeholder="自訂動作…"
          style="flex:1;border:1.5px solid #e5e5ea;border-radius:8px;padding:8px 12px;font-size:15px;outline:none">
        <button type="button" onclick="addCustomPilates()"
          style="padding:8px 16px;background:#4A90D9;color:white;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer">加入</button>
      </div>
      <div id="pilates-custom-list" style="padding:0 12px 8px"></div>
    </div>

    <!-- ===== 智慧模板：重訓 ===== -->
    <div id="weights-template" class="template-card hidden">
      <div class="template-header">
        <span>重訓動作</span>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="selected-count" id="weights-count"></span>
          <button type="button" class="template-clear" onclick="clearWeights()">清除</button>
        </div>
      </div>
      <div class="cat-tabs" id="cat-tabs"></div>
      <div class="exercise-grid" id="weights-grid"></div>
      <div style="display:flex;gap:8px;padding:4px 12px 12px">
        <input id="custom-ex" type="text" placeholder="自訂動作…"
          style="flex:1;border:1.5px solid #e5e5ea;border-radius:8px;padding:8px 12px;font-size:15px;outline:none">
        <button type="button" onclick="addCustomEx()"
          style="padding:8px 16px;background:#4A90D9;color:white;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer">加入</button>
      </div>
      <div class="selected-list" id="selected-list"></div>
    </div>

    <!-- 課程內容（自動填入，可手動改） -->
    <div class="form-group">
      <label>課程內容</label>
      <textarea id="content" placeholder="由上方模板自動填入，或直接輸入…" style="height:90px"></textarea>
    </div>

    <!-- 備註 -->
    <div class="form-group">
      <label>備註</label>
      <input id="notes" type="text" placeholder="補充說明">
    </div>

    <button type="submit" class="btn-primary">儲存</button>
    <div style="height:30px"></div>
  </form>

  <script src="js/api.js"></script>
  <script>
    // ── 動作資料庫 ────────────────────────────────────
    const PILATES = {

        'Hundred', 'Bent & Stretch 屈伸', 'Lift & Lower 抬放腿',
        'Adductor Stretch 內收肌', 'Short Spine 脊椎捲曲',
        'Misback Series 中背部', 'Back Rowing Preps 後划準備',
        'Side Arm Preps Sitting 側坐手臂', 'Side Twist Sitting 側轉坐姿',
        'Front Rowing Preps 前划準備', 'Stomach Massage 腹部按摩',
        'Arm Pulling Straps 雙臂拉環', 'Round Back Short Box 弓背',
        'Straight Back Short Box 直背', 'Twist Short Box 扭轉',
        'Tree Short Box 樹姿', 'Elephant 大象姿',
        'Mermaid 美人魚姿', 'Leg Circles 雙腳畫弧',

        'Hip Lift 髖部上抬', 'Hip Rolls 髖部起伏',
        'Single Thigh Stretch 單側大腿', 'Side Splits 側劈叉'
      ],
      advanced: [
        'Footwork 腿部練習', 'Second Position 第二種姿勢', 'Single Leg 單腿',
        'Hundred', 'Bent & Stretch 屈伸', 'Short Spine 脊椎捲曲',
        'Beats 拍擊', 'Frog 蛙跳姿', 'Stag 鹿跳姿', 'Coordination 協調性',
        'Back Rowing 後划', 'Front Rowing 前划', 'Stomach Massage 腹部按摩',
        'Arm Pulling Straps 雙臂拉環', 'Backstroke Prep 仰泳準備',
        'Feet Pulling Straps 腳拉環', 'Round Back Short Box 弓背',
        'Straight Back Short Box 直背', 'Twist With Round Back 扭轉',
        'Lean Short Box 傾斜', 'Tree Short Box 樹姿',
        'Mermaid Short Box 美人魚', 'Long Stretch', 'Down Stretch', 'Up Stretch',
        'Elephant 大象姿', 'Semicircle', 'Chest Expansion',
        'Side Arm Preps Kneeling 跪姿手臂', 'Side Twist Kneeling 側轉跪姿',
        'Reverse Expansion', 'Mermaid 美人魚姿', 'Leg Circles 雙腳畫弧',
        'Long Spine 長脊椎', 'Knee Stretches 膝部伸展', 'Running 跑步姿',
        'Hip Lift 髖部上抬', 'Hip Rolls 髖部起伏',
        'Single Thigh Stretch 單側大腿', 'Front Splits 前劈叉',
        'Back Splits 後劈叉', 'Side Splits 側劈叉', 'Star Prep'
      ]
    };

    const WEIGHTS = {
      'Warm up': [
        'soft tissue', 'mobility', 'warm up',
        '坐姿抬腿 (psoas)', 'Happy Baby', 'Supine 90/90',
        'Cat Cow(Seated)', 'Cat Cow(Standing)', 'Cat Cow(All four)',
        'Dolphin pose', 'Inchworm', 'Hip 90/90',
        'Bird-dog', 'QL active', 'Butt walk', 'Rolling'
      ],
      'Activate': [
        '##全身', '全身Activate', '熊爬', '蜥蜴爬', '橫向熊爬推拉', '站姿風車', '跪姿風車', '關節中心定位', 'T.G.U',
        '##上肢', '上肢Activate', 'PNF Upper D1', 'PNF Upper D2', 'Chop/Lift', '彈力帶肩內旋', '坐姿三角度旋轉', '彈力帶YW', 'Wall Walk', 'Wall Angle', 'Arm Bar', 'Bent Arm Bar',
        '##下肢', '下肢Activate', '大拇指四部', '橋式Bridge', '坐姿髖外轉', '側抬腿', '側躺髖旋轉', '蚌殼', '斜坐姿', '外側棒式', '單腳支撐+重量擺盪', 'Airplane', '坐姿踮腳', '仰臥踮腳',
        '##下肢節律', '下肢節律Activate', '單邊階梯踮腳(三關節節律)', '踮腳等長', 'Monlu', 'MSQ', '登階旋轉'
      ],
      '爆發': [
        '單-抓舉 SA Snatch', 'Swing', '煞車 Swing', '水平 Swing',
        '藥球-高拋砸', '藥球-淘金側砸', '跪姿拔刀', '火箭推', '內八換腳火箭推',
        '分腿旋轉+登階', '單腳RDL+上箱', 'Jump', '側跳', '彈力帶衝刺跑', 'High Pull'
      ],
      '下肢推拉': [
        '##推',
        '深蹲 SQ', '握把式 SSB', '前蹲 FSQ', '前抱式 Zercher\'s SQ',
        '登階 Step up', '分腿蹲 Split SQ', 'Lunges', 'R.F.E.S.S', 'A.F.E.S.S',
        '側蹲 Side SQ', 'Side lunges', '提踵 Heel raise', '單腳蹲 (側、後)',
        '臀推 Hip thruster', '短程離心高負荷',
        '##拉',
        '羅馬尼亞硬舉 RDL', '硬舉 DL', '北歐後腿彎舉 Nordic',
        '反式北歐彎舉', '後勾腿', 'Cable 髖外展'
      ],
      '上肢推拉': [
        '##推',
        '肩推 SP', 'Push Press', '臥推 BP', '上斜臥推 Incline BP',
        '上斜挺身 Incline Push up', '伏地挺身 Push up',
        '三頭 (單關節)', '三頭 (雙關節)',
        '##拉',
        '滑輪下拉 Pull down', '直臂下壓 Straight arm', '輔助引體向上 Chin Assist',
        '引體向上 Pull up', '划船 Row', 'Bench Row', '聳肩 Shrug',
        '前平舉', '後三角劃圈', 'Hanging Shrug', 'Crossover', '二頭', '三頭', '手腕'
      ],
      '複合動作': [
        '單手划船+鳥狗', '單手划船+棒式',
        '側棒式+卷腳趾', '側棒式+靜態拉', '棒式+動態拉'
      ],
      '核心': [
        '仰臥夾球', 'Sit up', '捲腹 Crunch',
        '棒式 Plank', '棒式鳥狗', '外側棒式',
        '側棒 Side plank', '側棒 (進階等長)', '哥本哈根側棒',
        '坐姿抬腿', '懸吊抬腿',
        '腹肌滾輪 (Lat)', '腹肌滾輪 (crunch)', 'GHD'
      ],
      '體能': [
        '風扇車', '划船機', '無動力跑步機', '戰繩', 'Wall Ball', 'Push Plate',
        '單-Swing', '雙-農夫走路', '單-農夫走路', '單-負重抬膝走', '過頭負重行走', '雪橇'
      ]
    };

    // ── 狀態 ─────────────────────────────────────────
    const studentId = new URLSearchParams(location.search).get('id');
    const editId = new URLSearchParams(location.search).get('edit');

    // 載入學員清單供一對二選擇
    API.apiGet('getStudents').then(students => {
      const sel = document.getElementById('partner');
      students
        .filter(s => s.id !== studentId && s.status === 'active')
        .sort((a, b) => a.name.localeCompare(b.name, 'zh-TW'))
        .forEach(s => {
          const opt = document.createElement('option');
          opt.value = s.id;
          opt.textContent = s.name;
          sel.appendChild(opt);
        });
    });
    let pilatesLevel = 'beginner';
    let pilatesSelected = new Set();
    let pilatesCustom = [];
    let currentCat = 'Warm up';
    let weightsAdded = []; // [{name, setting}]
    let _currentExercises = []; // 對應 weights-grid 目前的動作陣列

    // ── 初始化 ────────────────────────────────────────
    { const n = new Date(); document.getElementById('date').value = `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`; }
    buildCatTabs();
    onTypeChange();
    // 優先從 URL 讀預設地點（由學員資料頁帶入），不需等 API
    const venueParam = new URLSearchParams(location.search).get('venue');
    if (venueParam && !editId) document.getElementById('venue').value = venueParam;
    if (!editId) checkActivePayment();

    // ── 類型切換 ──────────────────────────────────────
    function onTypeChange() {
      if (editId) return;
      const type = document.getElementById('type').value;
      const showP = type === 'Pilates' || type === '重訓+Pilates';
      const showW = type === '重訓' || type === '重訓+Pilates';
      document.getElementById('pilates-template').classList.toggle('hidden', !showP);
      document.getElementById('weights-template').classList.toggle('hidden', !showW);
      if (showP) buildPilatesGrid();
      if (showW) buildWeightsGrid();
      rebuildContent();
    }

    // ── Pilates 模板 ──────────────────────────────────
    function switchLevel(level) {
      pilatesLevel = level;
      document.getElementById('tab-beginner').classList.toggle('active', level === 'beginner');
      document.getElementById('tab-advanced').classList.toggle('active', level === 'advanced');
      buildPilatesGrid();
    }

    function buildPilatesGrid() {
      const exercises = PILATES[pilatesLevel];
      const grid = document.getElementById('pilates-grid');
      grid.innerHTML = exercises.map((ex, i) => {
        const key = pilatesLevel + ':' + i;
        const sel = pilatesSelected.has(key);
        return `<button type="button" class="ex-chip${sel ? ' selected' : ''}"
          onclick="togglePilates('${pilatesLevel}',${i},this)">${ex}</button>`;
      }).join('');
      updatePilatesCount();
    }

    function togglePilates(level, idx, el) {
      const key = level + ':' + idx;
      if (pilatesSelected.has(key)) {
        pilatesSelected.delete(key);
        el.classList.remove('selected');
      } else {
        pilatesSelected.add(key);
        el.classList.add('selected');
      }
      updatePilatesCount();
      rebuildContent();
    }

    function clearPilates() {
      pilatesSelected.clear();
      pilatesCustom = [];
      renderPilatesCustomList();
      buildPilatesGrid();
      rebuildContent();
    }

    function addCustomPilates() {
      const input = document.getElementById('custom-pilates');
      const name = input.value.trim();
      if (!name) return;
      pilatesCustom.push(name);
      renderPilatesCustomList();
      input.value = '';
      rebuildContent();
    }

    function removePilatesCustom(idx) {
      pilatesCustom.splice(idx, 1);
      renderPilatesCustomList();
      rebuildContent();
    }

    function renderPilatesCustomList() {
      const el = document.getElementById('pilates-custom-list');
      if (!pilatesCustom.length) { el.innerHTML = ''; return; }
      el.innerHTML = pilatesCustom.map((name, i) => `
        <div class="selected-ex-row">
          <span class="selected-ex-name">${name}</span>
          <button type="button" class="selected-ex-del" onclick="removePilatesCustom(${i})">✕</button>
        </div>`).join('');
    }

    function updatePilatesCount() {
      const n = pilatesSelected.size;
      document.getElementById('pilates-count').textContent = n > 0 ? `已選 ${n}` : '';
    }

    function getPilatesContent() {
      const beginnerItems = [], advancedItems = [];
      PILATES.beginner.forEach((ex, i) => {
        if (pilatesSelected.has('beginner:' + i)) beginnerItems.push(ex);
      });
      PILATES.advanced.forEach((ex, i) => {
        if (pilatesSelected.has('advanced:' + i)) advancedItems.push(ex);
      });

      const hasBoth = beginnerItems.length > 0 && advancedItems.length > 0;
      const sections = [];
      if (beginnerItems.length) sections.push((hasBoth ? '初級：' : '') + beginnerItems.join(' / '));
      if (advancedItems.length) sections.push((hasBoth ? '中級：' : '') + advancedItems.join(' / '));
      if (pilatesCustom.length) sections.push(pilatesCustom.join(' / '));
      return sections.join(' ｜ ');
    }

    // ── 重訓模板 ──────────────────────────────────────
    function buildCatTabs() {
      const tabs = document.getElementById('cat-tabs');
      tabs.innerHTML = Object.keys(WEIGHTS).map(cat =>
        `<button type="button" class="cat-tab${cat === currentCat ? ' active' : ''}"
          onclick="switchCat('${cat}',this)">${cat}</button>`
      ).join('');
    }

    function switchCat(cat, el) {
      currentCat = cat;
      document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      buildWeightsGrid();
    }

    function buildWeightsGrid() {
      _currentExercises = WEIGHTS[currentCat] || [];
      const grid = document.getElementById('weights-grid');
      grid.innerHTML = _currentExercises.map((ex, i) => {
        if (ex.startsWith('##')) {
          return `<div style="grid-column:1/-1;padding:8px 4px 2px;font-size:11px;color:#8e8e93;font-weight:700;letter-spacing:0.8px;text-transform:uppercase">${ex.slice(2)}</div>`;
        }
        return `<button type="button" class="ex-chip" data-idx="${i}">${ex}</button>`;
      }).join('');
    }

    // 事件代理：所有 weights-grid 的點擊統一處理
    document.getElementById('weights-grid').addEventListener('click', function(e) {
      const btn = e.target.closest('[data-idx]');
      if (btn) addWeight(_currentExercises[parseInt(btn.dataset.idx)]);
    });

    function addWeight(name) {
      weightsAdded.push({ name, setting: '' });
      renderSelectedList();
      rebuildContent();
    }

    function addCustomEx() {
      const input = document.getElementById('custom-ex');
      const name = input.value.trim();
      if (!name) return;
      addWeight(name);
      input.value = '';
    }

    function removeWeight(idx) {
      weightsAdded.splice(idx, 1);
      renderSelectedList();
      rebuildContent();
    }

    function updateWeightSetting(idx, val) {
      weightsAdded[idx].setting = val;
      rebuildContent();
    }

    function renderSelectedList() {
      const list = document.getElementById('selected-list');
      if (weightsAdded.length === 0) {
        list.innerHTML = '';
        document.getElementById('weights-count').textContent = '';
        return;
      }
      document.getElementById('weights-count').textContent = `已加 ${weightsAdded.length}`;
      list.innerHTML = weightsAdded.map((item, i) => `
        <div class="selected-ex-row">
          <span class="selected-ex-name">${item.name}</span>
          <input class="selected-ex-setting" type="text" value="${item.setting}"
            placeholder="kg/組×次" oninput="updateWeightSetting(${i},this.value)">
          <button type="button" class="selected-ex-del" onclick="removeWeight(${i})">✕</button>
        </div>`
      ).join('');
    }

    function clearWeights() {
      weightsAdded = [];
      renderSelectedList();
      rebuildContent();
    }

    function getWeightsContent() {
      return weightsAdded.map(item =>
        item.setting ? `${item.name} (${item.setting})` : item.name
      ).join(' / ');
    }

    // ── 課程內容 ──────────────────────────────────────
    function rebuildContent() {
      const type = document.getElementById('type').value;
      const parts = [];
      if ((type === 'Pilates' || type === '重訓+Pilates') && pilatesSelected.size > 0) {
        parts.push(getPilatesContent());
      }
      if ((type === '重訓' || type === '重訓+Pilates') && weightsAdded.length > 0) {
        parts.push(getWeightsContent());
      }
      if (parts.length > 0) {
        document.getElementById('content').value = parts.join(' | ');
      }
    }

    // ── 付款周期查詢（含夥伴 fallback）────────────────
    async function getActivePaymentWithPartner(sid, venue) {
      let active = await API.apiGet('getActivePayment', { studentId: sid, venue });
      if (active?.payment) return { active, usingPartner: false };
      const defaultPartnerId = localStorage.getItem('partner_' + sid);
      if (defaultPartnerId) {
        const partnerActive = await API.apiGet('getActivePayment', { studentId: defaultPartnerId, venue });
        if (partnerActive?.payment) return { active: partnerActive, usingPartner: true, partnerId: defaultPartnerId };
      }
      return { active: null, usingPartner: false };
    }

    async function checkActivePayment() {
      const venue = document.getElementById('venue').value;
      const notice = document.getElementById('session-notice');
      try {
        const { active, usingPartner } = await getActivePaymentWithPartner(studentId, venue);
        if (active?.payment) {
          const p = active.payment;
          const prefix = usingPartner ? '⇄ 使用夥伴付款　' : '';
          notice.innerHTML = `<div class="notice">${prefix}目前周期：${p.package_name || '未命名'} · 已上 ${active.used} 堂，本堂為第 <strong>${active.session_number}</strong> 堂／共 ${p.period_sessions} 堂</div>`;
        } else {
          const rate = localStorage.getItem('single_rate_' + studentId);
          if (rate) {
            notice.innerHTML = `<div class="notice" style="display:flex;align-items:center;gap:10px;background:#fff2f2;border-left:3px solid #ff3b30">
              <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
                <input type="checkbox" id="single-charge-cb" checked style="width:18px;height:18px;accent-color:#ff3b30">
                <span style="color:#ff3b30;font-weight:600">本次收費 $${Number(rate).toLocaleString()}（單次）</span>
              </label>
            </div>`;
          } else {
            notice.innerHTML = `<div class="notice">⚠️ ${venue} 目前無有效付款周期，此堂將標示為「未連結」</div>`;
          }
        }
      } catch(e) {
        notice.innerHTML = '';
      }
    }

    // ── 儲存 ──────────────────────────────────────────
    async function submitForm(e) {
      e.preventDefault();
      const btn = document.querySelector('.btn-primary');
      btn.textContent = '儲存中…';
      btn.disabled = true;

      if (editId) {
        await API.apiPost('updateClass', {
          id: editId,
          date: document.getElementById('date').value,
          venue: document.getElementById('venue').value,
          type: document.getElementById('type').value,
          content: document.getElementById('content').value,
          notes: document.getElementById('notes').value,
          payment_id: document.getElementById('edit-payment-sel')?.value || ''
        });
        history.back();
        return;
      }

      const payload = {
        date: document.getElementById('date').value,
        venue: document.getElementById('venue').value,
        type: document.getElementById('type').value,
        content: document.getElementById('content').value,
        extra_charge: Number(document.getElementById('extra_charge').value) || 0,
        notes: document.getElementById('notes').value
      };

      const partnerId = document.getElementById('partner').value;
      const venue = payload.venue;

      if (partnerId) {
        // 一對二：各自查付款週期，各連各的（含夥伴 fallback）
        const selfNotes = payload.notes ? payload.notes + '（一對二）' : '一對二';
        const [selfResult, partnerResult] = await Promise.all([
          getActivePaymentWithPartner(studentId, venue),
          getActivePaymentWithPartner(partnerId, venue)
        ]);
        const selfPayId = selfResult.active?.payment?.id || '';
        const partnerPayId = partnerResult.active?.payment?.id || '';
        await Promise.all([
          API.apiPost('addClass', { ...payload, student_id: studentId, notes: selfNotes, payment_id: selfPayId }),
          API.apiPost('addClass', { ...payload, student_id: partnerId, notes: selfNotes, payment_id: partnerPayId })
        ]);
      } else {
        // 一對一：查自己的付款，無則抓夥伴的
        let { active } = await getActivePaymentWithPartner(studentId, venue);
        let paymentId = active?.payment?.id || '';

        // 若無付款包且勾選單次收費，先建付款再連結
        if (!paymentId) {
          const cb = document.getElementById('single-charge-cb');
          const rate = localStorage.getItem('single_rate_' + studentId);
          if (cb?.checked && rate) {
            const pmtResult = await API.apiPost('addPayment', {
              student_id: studentId,
              venue: payload.venue,
              date: payload.date,
              package_name: '單次',
              period_sessions: 1,
              total_amount: Number(rate),
              paid_amount: Number(rate)
            });
            paymentId = pmtResult.id || '';
          }
        }

        await API.apiPost('addClass', { ...payload, student_id: studentId, payment_id: paymentId });
      }

      history.back();
    }
    if (editId) initEditMode();

    async function initEditMode() {
      document.querySelector('.header span:nth-child(2)').textContent = '編輯上課記錄';
      document.querySelector('.btn-primary').textContent = '儲存變更';
      document.getElementById('pilates-template').classList.add('hidden');
      document.getElementById('weights-template').classList.add('hidden');
      document.getElementById('extra_charge').closest('.form-group').style.display = 'none';
      document.getElementById('partner').parentElement.style.display = 'none';

      const classes = await API.apiGet('getClasses', { studentId });
      const cls = classes.find(c => c.id === editId);
      if (!cls) { alert('找不到上課記錄'); history.back(); return; }

      const _cd = new Date(cls.date);
      document.getElementById('date').value = `${_cd.getFullYear()}-${String(_cd.getMonth()+1).padStart(2,'0')}-${String(_cd.getDate()).padStart(2,'0')}`;
      document.getElementById('venue').value = cls.venue || '武士';
      document.getElementById('type').value = cls.type || '重訓';
      document.getElementById('content').value = cls.content || '';
      document.getElementById('notes').value = cls.notes || '';

      const payments = await API.apiGet('getPayments', { studentId });
      const opts = [
        '<option value="">無連結</option>',
        ...payments
          .sort((a, b) => String(b.date).localeCompare(String(a.date)))
          .map(p => { const _pd = new Date(p.date); const _ds = `${_pd.getFullYear()}-${String(_pd.getMonth()+1).padStart(2,'0')}-${String(_pd.getDate()).padStart(2,'0')}`; return `<option value="${p.id}" ${p.id === cls.payment_id ? 'selected' : ''}>${_ds} ${p.package_name || ''} (${p.period_sessions}堂)</option>`; })
      ].join('');
      document.getElementById('session-notice').innerHTML =
        `<div class="form-group" style="padding-top:0"><label>連結付款</label><select id="edit-payment-sel" style="border:1px solid #e5e5ea;border-radius:8px;padding:10px 12px;font-size:15px;width:100%;background:white;color:#1c1c1e">${opts}</select></div>`;
    }
  </script>
</body>
